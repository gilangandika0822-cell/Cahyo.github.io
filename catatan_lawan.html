<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catatan Lawan</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      padding: 20px;
    }
    .wrap {
      background: white;
      border-radius: 12px;
      padding: 20px;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    h2 {
      font-size: 17px;
      font-weight: 600;
      color: #222;
      margin-bottom: 16px;
    }
    .current-label {
      font-size: 14px;
      font-weight: 600;
      color: #1a6fcc;
      margin-bottom: 10px;
    }
    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }
    input[type=text] {
      flex: 1;
      padding: 10px 12px;
      font-size: 15px;
      border: 1px solid #ccc;
      border-radius: 8px;
      outline: none;
    }
    input[type=text]:focus {
      border-color: #1a6fcc;
    }
    button.btn-add {
      padding: 10px 16px;
      background: #1a6fcc;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    button.btn-add:hover { background: #155db0; }
    .progress {
      font-size: 13px;
      color: #888;
      margin-bottom: 4px;
    }
    .result {
      margin-top: 16px;
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      overflow: hidden;
    }
    .result-header {
      font-size: 13px;
      font-weight: 600;
      color: #555;
      padding: 8px 12px;
      background: #f0f0f0;
      border-bottom: 1px solid #e0e0e0;
    }
    .result-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      border-bottom: 1px solid #f0f0f0;
    }
    .result-item:last-child { border-bottom: none; }
    .num {
      font-size: 12px;
      font-weight: 600;
      color: #888;
      min-width: 40px;
    }
    .name {
      font-size: 15px;
      font-weight: 500;
      color: #222;
    }
    .btn-reset {
      margin-top: 12px;
      font-size: 13px;
      color: #888;
      background: none;
      border: none;
      cursor: pointer;
      text-decoration: underline;
      display: block;
    }
    .btn-reset:hover { color: #333; }
  </style>
</head>
<body>
<div class="wrap">
  <h2>Catatan Lawan Putaran 1</h2>

  <div id="input-section">
    <div class="current-label" id="current-label">Masukkan lawan ke-1</div>
    <div class="input-row">
      <input type="text" id="name-input" placeholder="Nama lawan..." />
      <button class="btn-add" onclick="addLawan()">Tambah</button>
    </div>
    <div class="progress" id="progress">0 / 7 lawan dimasukkan</div>
  </div>

  <div id="result-section" style="display:none;">
    <div class="result">
      <div class="result-header">Urutan Lawan Putaran 1</div>
      <div id="result-list"></div>
    </div>
    <button class="btn-reset" onclick="resetAll()">Reset / Mulai ulang</button>
  </div>
</div>

<script>
  const lawans = [];
  const input = document.getElementById('name-input');

  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') addLawan();
  });

  function addLawan() {
    const val = input.value.trim();
    if (!val || lawans.length >= 7) return;

    lawans.push(val);
    input.value = '';

    document.getElementById('progress').textContent = lawans.length + ' / 7 lawan dimasukkan';

    if (lawans.length < 7) {
      document.getElementById('current-label').textContent = 'Masukkan lawan ke-' + (lawans.length + 1);
      input.focus();
    } else {
      showResult();
    }
  }

  function showResult() {
    document.getElementById('input-section').style.display = 'none';
    const list = document.getElementById('result-list');
    list.innerHTML = '';
    lawans.forEach((name, i) => {
      const div = document.createElement('div');
      div.className = 'result-item';
      div.innerHTML = '<span class="num">Ke-' + (i + 1) + '</span><span class="name">' + name + '</span>';
      list.appendChild(div);
    });
    document.getElementById('result-section').style.display = 'block';
  }

  function resetAll() {
    lawans.length = 0;
    document.getElementById('current-label').textContent = 'Masukkan lawan ke-1';
    document.getElementById('progress').textContent = '0 / 7 lawan dimasukkan';
    document.getElementById('result-section').style.display = 'none';
    document.getElementById('input-section').style.display = 'block';
    input.value = '';
    input.focus();
  }

  window.onload = () => input.focus();
</script>
</body>
</html>
